<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Blocks</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <script src="main.js" type="module" defer></script>
    <script src="/confetti.browser.min.js"></script>
  </head>
  <body>
    <button id="theme-toggle" aria-label="Toggle dark mode">Dark Mode</button>

    <h1>Base Blocks</h1>
    <!-- <h2>Growing Set Mode</h2> -->
    <h2>...memory inspired number matching game</h2>

    <section class="main">
      <div class="grid-container">
        <!--     <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div>
      <div class="block"></div> -->
      </div>
      <div class="display">
        <p>Score: <span class="score">0</span></p>

        <p>Level: <span class="level">1</span></p>
        <div class="actions">
          <button id="restart-button" aria-label="Restart the game">
            Restart
          </button>
          <br />
        </div>
      </div>

      <div class="below-game">
        <div class="instructions-container">
          <p class="instructions">
            Match blocks with the same value across different number systems.
          </p>
          <p class="instructions">
            Mouse: <br />
            Left click = select <br />
            Right click = flip <br />
            <br />
            Keyboard: <br />
            Enter = select <br />
            Space = flip <br />
            <br />
            Mobile: <br />
            Tap = select <br />
            Swipe = flip
          </p>
        </div>
      </div>
    </section>
    <p style="text-align: center">
      <a class="see-code" href="https://github.com/RemiSlanina/base-blocks"
        >Source Code
      </a>
    </p>
  </body>
</html>
